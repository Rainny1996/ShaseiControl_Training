name: Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Check Xcode versions
        run: |
          echo "Default Xcode:"
          xcodebuild -version
          echo ""
          echo "Available Xcode versions:"
          ls /Applications/ | grep Xcode

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          xcodegen generate
          echo "Project generated. Listing files:"
          ls -la *.xcodeproj

      - name: Build App
        run: |
          set -e
          xcodebuild build \
            -project ControlTraining.xcodeproj \
            -scheme ControlTraining \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ENABLE_BITCODE=NO \
            2>&1 | tee build.log
          echo "Build exit code: $?"

      - name: Debug - List build products
        if: always()
        run: |
          echo "=== Build directory structure ==="
          find build -type d -maxdepth 4 2>/dev/null || echo "build directory not found"
          echo ""
          echo "=== .app files ==="
          find build -name "*.app" 2>/dev/null || echo "No .app files found"
          echo ""
          echo "=== Products directory ==="
          ls -laR build/Build/Products/ 2>/dev/null || echo "Products directory not found"

      - name: Create IPA
        run: |
          set -e
          APP_PATH=$(find build -name "ControlTraining.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find ControlTraining.app"
            echo "Checking build log for errors..."
            grep -i "error:" build.log | head -20 || echo "No errors found in log"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r ControlTraining.ipa Payload
          echo "IPA created successfully"
          ls -la ControlTraining.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ControlTraining-ipa
          path: ControlTraining.ipa
          retention-days: 30

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log
          path: build.log
          retention-days: 7