name: Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build App
        run: |
          xcodebuild build \
            -project ControlTraining.xcodeproj \
            -scheme ControlTraining \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ENABLE_BITCODE=NO \
            | xcpretty || true

      - name: Create IPA
        run: |
          APP_PATH=$(find build -name "ControlTraining.app" -path "*/Release-iphoneos/*" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Could not find ControlTraining.app"
            echo "Searching for .app files..."
            find build -name "*.app" || true
            echo "Listing build products..."
            ls -la build/Build/Products/ || true
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r ControlTraining.ipa Payload
          echo "IPA created successfully"
          ls -la ControlTraining.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ControlTraining-ipa
          path: ControlTraining.ipa
          retention-days: 30